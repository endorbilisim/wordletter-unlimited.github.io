<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordletter Unlimited</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f0fdf4",
                100: "#dcfce7",
                500: "#22c55e",
                600: "#16a34a",
                700: "#15803d",
                900: "#14532d",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col"
  >
    <!-- Header -->
    <header class="bg-brand-700 text-white shadow-md">
      <div class="max-w-3xl mx-auto px-6 py-5">
        <h1 class="text-2xl font-bold tracking-tight">Wordletter Unlimited</h1>
        <p class="text-brand-100 text-sm mt-0.5">Legal Documents</p>
      </div>
    </header>

    <!-- Cards -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-12">
      <div class="grid gap-6 sm:grid-cols-2">
        <!-- Privacy Policy Card -->
        <a
          href="privacy-policy.html"
          class="group block bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md hover:border-brand-500 transition-all duration-200 p-6"
        >
          <div class="flex items-start gap-4">
            <div
              class="flex-shrink-0 w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600 group-hover:bg-brand-100 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 11c0-1.657-1.343-3-3-3S6 9.343 6 11v1H4v8h16v-8h-2v-1c0-1.657-1.343-3-3-3s-3 1.343-3 3v1h-2v-1z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 11V9a3 3 0 016 0v2"
                />
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <h2
                class="text-base font-semibold text-gray-900 group-hover:text-brand-700 transition-colors"
              >
                Privacy Policy
              </h2>
              <p class="mt-1 text-sm text-gray-500 leading-relaxed">
                How we collect, use, and protect your personal information.
              </p>
            </div>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-gray-300 group-hover:text-brand-500 flex-shrink-0 mt-0.5 transition-colors"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </div>
        </a>

        <!-- Terms of Use Card -->
        <a
          href="terms-of-use.html"
          class="group block bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md hover:border-brand-500 transition-all duration-200 p-6"
        >
          <div class="flex items-start gap-4">
            <div
              class="flex-shrink-0 w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600 group-hover:bg-brand-100 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                />
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <h2
                class="text-base font-semibold text-gray-900 group-hover:text-brand-700 transition-colors"
              >
                Terms of Use
              </h2>
              <p class="mt-1 text-sm text-gray-500 leading-relaxed">
                The rules and guidelines for using Wordletter Unlimited.
              </p>
            </div>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-gray-300 group-hover:text-brand-500 flex-shrink-0 mt-0.5 transition-colors"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </div>
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-gray-400 py-6">
      &copy;
      <script>
        document.write(new Date().getFullYear());
      </script>
      Wordletter Unlimited. All rights reserved.
    </footer>
  </body>
</html>
